<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatjarLink — Execution Plan</title>
<style>
  :root{
    --maroon:#8E1B5B; --maroon-d:#6f1247; --orange:#F2A03D;
    --ink:#2b2030; --muted:#7a6c80; --line:#ece2ee; --bg:#faf6fb; --card:#ffffff;
    --green:#1f9d6b; --red:#d23b4e; --red-bg:#fdeaec;
    --amber:#c9821a; --amber-bg:#fdf2e0; --blue:#2f6bd6; --blue-bg:#eaf1fd;
    --green-bg:#e6f6ef; --purple-bg:#f3ecfb; --purple:#7a3fc9;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Helvetica Neue",Tahoma,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;font-size:15px}
  .wrap{max-width:1100px;margin:0 auto;padding:0 18px 80px}
  header{background:linear-gradient(135deg,var(--maroon),var(--maroon-d));
    color:#fff;padding:30px 0 26px;margin-bottom:24px;box-shadow:0 6px 24px rgba(142,27,91,.25)}
  .head-in{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .logo{width:72px;height:72px;flex:0 0 auto;background:#fff;border-radius:18px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .logo svg{width:50px;height:50px}
  header h1{margin:0;font-size:25px;font-weight:800}
  header .sub{opacity:.92;margin-top:6px;font-size:14px}
  header .meta{margin-top:10px;font-size:12.5px;opacity:.88;display:flex;gap:18px;flex-wrap:wrap}
  header .meta b{color:var(--orange)}
  .head-side{margin-inline-start:auto;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .langsw{display:flex;gap:6px;background:rgba(255,255,255,.14);padding:4px;border-radius:30px}
  .langsw button{border:0;background:transparent;color:#fff;border-radius:24px;padding:6px 14px;
    font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;opacity:.8;transition:.15s}
  .langsw button.active{background:#fff;color:var(--maroon);opacity:1}
  .overall{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 22px;margin-bottom:22px}
  .overall .bar{height:14px;background:#f0e7f2;border-radius:20px;overflow:hidden;margin-top:10px}
  .overall .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--maroon));width:0;border-radius:20px;transition:width .5s ease}
  .overall .lbl{display:flex;justify-content:space-between;align-items:center;font-weight:700}
  .overall .lbl span{color:var(--maroon);font-size:18px}
  .overall .sub2{margin-top:8px;font-size:12.5px;color:var(--muted)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:26px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:var(--maroon)}
  .stat .t{font-size:12.5px;color:var(--muted);margin-top:2px}
  .stat.r .n{color:var(--red)} .stat.o .n{color:var(--amber)} .stat.g .n{color:var(--green)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .controls .grp{display:flex;gap:6px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:30px;padding:7px 15px;font-size:13px;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{border-color:var(--maroon)}
  .btn.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .btn.print{margin-inline-start:auto;background:var(--orange);color:#fff;border-color:var(--orange);font-weight:700}
  section.block{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:16px;overflow:hidden}
  .sec-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;
    background:linear-gradient(90deg,#fbeef5,#fff);border-inline-start:5px solid var(--maroon)}
  .sec-head h2{margin:0;font-size:17px;color:var(--maroon);flex:1}
  .sec-head .goal{font-size:12.5px;color:var(--muted);font-weight:400;display:block;margin-top:3px}
  .sec-head .mini{font-size:12px;color:var(--muted);white-space:nowrap}
  .sec-head .chev{transition:.25s;color:var(--maroon);font-size:13px}
  section.collapsed .chev{transform:rotate(-90deg)}
  section.collapsed .sec-body{display:none}
  .sec-head.crit{border-inline-start-color:var(--red);background:linear-gradient(90deg,#fdeef0,#fff)}
  .sec-head.crit h2{color:var(--red)}
  html[dir=ltr] section.collapsed .chev{transform:rotate(90deg)}
  .sec-body{padding:6px 14px 16px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{color:var(--muted);font-weight:700;font-size:12px;padding:8px 10px;border-bottom:2px solid var(--line);text-align:start}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:start}
  tr.done td{opacity:.55}
  tr.done td .task{text-decoration:line-through}
  .task{font-weight:600}
  .desc{color:var(--muted);font-size:12.5px;margin-top:2px}
  .id{color:var(--orange);font-weight:800;font-size:12px;white-space:nowrap}
  td.chk{width:34px;text-align:center}
  input[type=checkbox]{width:19px;height:19px;accent-color:var(--maroon);cursor:pointer}
  .badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .p-crit{background:var(--red-bg);color:var(--red)}
  .p-high{background:var(--amber-bg);color:var(--amber)}
  .p-norm{background:var(--blue-bg);color:var(--blue)}
  .dept{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;margin:1px 2px}
  .d-dev{background:var(--blue-bg);color:var(--blue)}
  .d-adm{background:var(--purple-bg);color:var(--purple)}
  .d-cs{background:var(--green-bg);color:var(--green)}
  .d-mk{background:var(--amber-bg);color:var(--amber)}
  footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:30px;padding-top:20px;border-top:1px solid var(--line)}
  .reset{color:var(--red);cursor:pointer;text-decoration:underline;font-size:12px}
  td.who select{padding:4px 6px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:12.5px;max-width:130px;background:#fff;color:var(--ink);cursor:pointer}
  td.act{width:36px;text-align:center}
  td.seqcell{width:50px}
  .seq{width:44px;padding:4px 2px;border:1px solid var(--line);border-radius:7px;text-align:center;font-weight:800;color:var(--maroon);font-family:inherit;font-size:13.5px;background:#fff}
  .seq:focus{outline:2px solid var(--orange);border-color:var(--orange)}
  .sbtn{background:none;border:1px solid var(--line);border-radius:6px;font-size:11px;padding:0 6px;cursor:pointer;color:var(--maroon);vertical-align:middle;line-height:1.6}
  .sbtn.open{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .stepbox{background:#fbf6fa;border:1px dashed #e2cfe0;border-radius:10px;padding:10px 14px;margin:2px 0 6px}
  .stepbox b{color:var(--maroon);font-size:12.5px}
  .stepbox ol{margin:6px 0 0;padding-inline-start:20px}
  .stepbox li{margin:3px 0;font-size:13px;color:var(--ink);line-height:1.6}
  .modal textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);resize:vertical;line-height:1.6}
  /* tabs */
  .tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:30px;padding:5px;margin-bottom:20px;flex-wrap:wrap}
  .tabs button{flex:1;min-width:120px;border:0;background:transparent;color:var(--muted);border-radius:24px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .tabs button.active{background:var(--maroon);color:#fff}
  .view{display:none} .view.active{display:block}
  /* current user */
  .me-sel{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border-radius:24px;padding:4px 6px 4px 12px;color:#fff;font-size:12.5px}
  .me-sel select{border:0;border-radius:20px;padding:5px 10px;font-family:inherit;font-size:12.5px;background:#fff;color:var(--maroon);font-weight:700;cursor:pointer}
  /* dates */
  td.datecell{white-space:nowrap}
  .due{display:inline-block;font-size:12px;border-radius:6px;padding:2px 7px;font-weight:700;background:#f0e7f2;color:var(--muted)}
  .due.over{background:var(--red-bg);color:var(--red)} .due.soon{background:var(--amber-bg);color:var(--amber)}
  .due.ok{background:var(--green-bg);color:var(--green)}
  .modal input[type=date]{cursor:pointer}
  .clip{display:inline-block;background:#eef;border:1px solid #dde;color:#3a3a8a;border-radius:6px;font-size:11px;padding:1px 6px;cursor:pointer;margin-inline-start:4px;font-weight:700}
  /* activity log */
  .logitem{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:8px}
  .logitem .ic{font-size:20px;flex:0 0 auto}
  .logitem .tx{flex:1;font-size:13.5px}
  .logitem .tx b{color:var(--maroon)}
  .logitem .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .logitem .tag{font-size:11px;background:#f3ecfb;color:var(--purple);border-radius:5px;padding:1px 6px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input[type=text]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px}
  .empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
  /* files archive */
  .fgroup{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
  .fgroup h3{margin:0;padding:12px 18px;background:linear-gradient(90deg,#fbeef5,#fff);color:var(--maroon);font-size:15px;border-inline-start:4px solid var(--orange)}
  .fitem{display:flex;align-items:center;gap:12px;padding:10px 18px;border-top:1px solid var(--line)}
  .fitem .fic{font-size:24px}
  .fitem .fn{flex:1;font-size:13.5px;font-weight:600;word-break:break-all}
  .fitem .fmeta{font-size:11.5px;color:var(--muted)}
  .fitem a.dl,.fitem button.fdel{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;text-decoration:none;color:var(--ink);font-family:inherit}
  .fitem a.dl:hover{border-color:var(--maroon);color:var(--maroon)} .fitem button.fdel:hover{border-color:var(--red);color:var(--red)}
  .attlist{margin-top:8px;display:flex;flex-direction:column;gap:6px}
  .attlist .att{display:flex;align-items:center;gap:8px;background:#faf6fb;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px}
  .attlist .att .an{flex:1;word-break:break-all}
  .attlist .att button{border:0;background:none;color:var(--red);cursor:pointer;font-size:14px}
  .ebtn{background:none;border:1px solid var(--line);border-radius:7px;padding:3px 8px;cursor:pointer;font-size:13px}
  .ebtn:hover{border-color:var(--maroon);color:var(--maroon)}
  .btn.add{background:var(--green);color:#fff;border-color:var(--green);font-weight:700}
  .flbl{font-size:12px;color:var(--muted);font-weight:700;align-self:center;margin-inline-end:4px}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(43,32,48,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:22px 24px;max-width:500px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 6px;color:var(--maroon);font-size:19px}
  .modal label.fld{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:13px 0 4px}
  .modal input,.modal select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink)}
  .chkrow{display:flex;gap:16px;flex-wrap:wrap;margin-top:2px}
  .chkrow label{display:flex;align-items:center;gap:6px;margin:0;font-weight:600;color:var(--ink);cursor:pointer;font-size:13.5px}
  .chkrow input{width:auto}
  .modal-actions{display:flex;align-items:center;gap:8px;margin-top:22px}
  .btn-save{background:var(--maroon);color:#fff;border:0;border-radius:9px;padding:10px 22px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
  .btn-cancel{background:#eee;border:0;border-radius:9px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:14px}
  .btn-del{background:var(--red-bg);color:var(--red);border:0;border-radius:9px;padding:10px 14px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px}
  @media print{ td.who select{border:0;-webkit-appearance:none;appearance:none} td.act,.ebtn,.sbtn{display:none}
    tr.steprow{display:table-row!important} }
  @media (max-width:640px){ .desc{display:none} th.hide-m,td.hide-m{display:none} header h1{font-size:20px} }
  @media print{ .controls,.btn.print,header .meta,.head-side{display:none}
    section.collapsed .sec-body{display:block!important} body{background:#fff} section.block{break-inside:avoid} }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="6" stroke-linecap="round">
        <path d="M22 52 q0-14 14-14 q14 0 14 14" stroke="#F2A03D"/>
        <rect x="34" y="38" width="34" height="34" rx="9" stroke="#8E1B5B"/>
        <rect x="22" y="50" width="34" height="34" rx="9" stroke="#F2A03D"/>
        <circle cx="34" cy="52" r="3.5" fill="#8E1B5B" stroke="none"/>
        <circle cx="50" cy="38" r="3.5" fill="#F2A03D" stroke="none"/>
      </svg>
    </div>
    <div>
      <h1 id="h1"></h1>
      <div class="sub" id="subtitle"></div>
      <div class="meta">
        <span><span id="crLabel"></span>: <b>1392087</b></span>
        <span><span id="phaseLabel"></span>: <b id="phaseVal"></b></span>
        <span><span id="versionLabel"></span>: <b id="versionVal"></b></span>
      </div>
    </div>
    <div class="head-side">
      <div class="langsw" id="langsw">
        <button data-l="ar">العربية</button>
        <button data-l="en">English</button>
        <button data-l="fa">فارسی</button>
      </div>
      <div class="me-sel"><span id="meLabel"></span><select id="meSel"></select></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs">
    <button data-v="plan" class="active" id="tabPlan"></button>
    <button data-v="activity" id="tabLog"></button>
    <button data-v="files" id="tabFiles"></button>
  </div>

  <div class="view active" id="view-plan">
  <div class="overall">
    <div class="lbl"><div id="overallLabel"></div><span id="pct">0%</span></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="sub2">
      <span id="pgPre"></span> <b id="doneCount">0</b> <span id="pgMid"></span> <b id="totalCount">0</b> <span id="pgPost"></span>
      · <span class="reset" id="resetBtn"></span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="s-total">0</div><div class="t" id="st-total"></div></div>
    <div class="stat r"><div class="n" id="s-crit">0</div><div class="t" id="st-crit"></div></div>
    <div class="stat o"><div class="n" id="s-high">0</div><div class="t" id="st-high"></div></div>
    <div class="stat"><div class="n" id="s-norm">0</div><div class="t" id="st-norm"></div></div>
    <div class="stat g"><div class="n" id="s-done">0</div><div class="t" id="st-done"></div></div>
  </div>

  <div class="controls">
    <span class="flbl" id="deptFlbl"></span>
    <div class="grp" id="deptFilter">
      <button class="btn active" data-f="all"></button>
      <button class="btn" data-f="dev"></button>
      <button class="btn" data-f="adm"></button>
      <button class="btn" data-f="cs"></button>
      <button class="btn" data-f="mk"></button>
    </div>
  </div>
  <div class="controls">
    <span class="flbl" id="personFlbl"></span>
    <div class="grp" id="personFilter"></div>
    <button class="btn add" id="addBtn"></button>
    <button class="btn" id="dbBtn" title="SQLite">🗄️ <span id="dbState"></span></button>
    <button class="btn" id="cloudBtn" onclick="openCloud()">☁️ <span id="cloudState"></span></button>
    <button class="btn print" id="printBtn" onclick="window.print()"></button>
  </div>

  <div id="content"></div>
  </div><!-- /view-plan -->

  <div class="view" id="view-activity">
    <div class="toolbar">
      <input type="text" id="logSearch" oninput="renderLog()">
      <select id="logActor" onchange="renderLog()"></select>
      <button class="btn" id="logClearBtn"></button>
    </div>
    <div id="logList"></div>
  </div><!-- /view-activity -->

  <div class="view" id="view-files">
    <div class="toolbar">
      <input type="text" id="fileSearch" oninput="renderFiles()">
      <span class="flbl" id="filesTotal"></span>
    </div>
    <div id="filesList"></div>
  </div><!-- /view-files -->

  <footer id="footer"></footer>
</div>
<script src="lib/sql-asm-memory-growth.js"></script>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <label class="fld" id="lbl-sec"></label>
    <select id="m-sec"></select>
    <label class="fld" id="lbl-task"></label>
    <input id="m-task" type="text">
    <label class="fld" id="lbl-desc"></label>
    <input id="m-desc" type="text">
    <label class="fld" id="lbl-steps"></label>
    <textarea id="m-steps" rows="4"></textarea>
    <label class="fld" id="lbl-dept"></label>
    <div id="m-depts" class="chkrow"></div>
    <label class="fld" id="lbl-pri"></label>
    <select id="m-pri"></select>
    <label class="fld" id="lbl-start"></label>
    <input id="m-start" type="date">
    <label class="fld" id="lbl-due"></label>
    <input id="m-due" type="date">
    <label class="fld" id="lbl-who"></label>
    <select id="m-who"></select>
    <div id="m-attach-wrap">
      <label class="fld" id="lbl-attach"></label>
      <input type="file" id="m-file" multiple>
      <div class="attlist" id="m-attach-list"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="m-del"></button>
      <span style="flex:1"></span>
      <button class="btn-cancel" id="m-cancel"></button>
      <button class="btn-save" id="m-save"></button>
    </div>
  </div>
</div>

<div id="dbOverlay" style="position:fixed;inset:0;background:rgba(43,32,48,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:18px;padding:30px 28px;max-width:470px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <div style="font-size:42px">🗄️</div>
    <h2 id="dbT" style="color:#8E1B5B;margin:10px 0 6px;font-size:21px"></h2>
    <p id="dbHint" style="color:#7a6c80;font-size:13.5px;line-height:1.7;margin:0 0 22px"></p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="dbOpen" class="btn-save" style="width:100%;padding:12px"></button>
      <button id="dbNew" class="btn" style="width:100%;padding:11px"></button>
      <button id="dbSkip" style="width:100%;padding:9px;border:0;background:none;color:#7a6c80;cursor:pointer;font-family:inherit;font-size:13px"></button>
    </div>
    <div id="dbErr" style="color:#d23b4e;font-size:12.5px;margin-top:12px"></div>
  </div>
</div>

<div class="modal-bg" id="cloudBg">
  <div class="modal">
    <h3 id="cloudTitle"></h3>
    <div id="cloudHint" style="font-size:12.5px;color:var(--muted);margin-bottom:6px"></div>
    <label class="fld" id="lbl-curl"></label>
    <input id="c-url" type="text" placeholder="https://script.google.com/macros/s/.../exec">
    <label class="fld" id="lbl-ctoken"></label>
    <input id="c-token" type="text">
    <div id="cloudMsg" style="font-size:13px;margin-top:10px;font-weight:700"></div>
    <div class="modal-actions" style="flex-wrap:wrap">
      <button class="btn-del" id="c-disc"></button>
      <span style="flex:1"></span>
      <button class="btn" id="c-pull"></button>
      <button class="btn" id="c-push"></button>
      <button class="btn-cancel" id="c-cancel"></button>
      <button class="btn-save" id="c-save"></button>
    </div>
  </div>
</div>

<div class="modal-bg" id="attBg">
  <div class="modal">

 'A1.3':{ar:['افصل بيئة الإنتاج عن التطوير','فعّل نسخاً احتياطياً يومياً تلقائياً','ركّب شهادة SSL/TLS واختبر التشفير'],en:['Separate production from development','Enable automatic daily backups','Install SSL/TLS and verify encryption'],fa:['محیط تولید را از توسعه جدا کنید','پشتیبان‌گیری روزانه خودکار فعال کنید','SSL/TLS نصب و رمزگذاری را بررسی کنید']},
 'A1.4':{ar:['اطلب من مستخدم مبتدئ تجربة الـ١٠ خطوات','سجّل نقاط الالتباس والوقت لكل خطوة','بسّط الخطوات المعقّدة بناءً على الملاحظات'],en:['Have a beginner go through the 10 steps','Record confusion points and time per step','Simplify complex steps based on feedback'],fa:['از یک کاربر مبتدی بخواهید ۱۰ مرحله را طی کند','نقاط ابهام و زمان هر مرحله را ثبت کنید','مراحل پیچیده را بر اساس بازخورد ساده کنید']},
 'A1.5':{ar:['اختبر كل تكامل (ثواني، بنك مسقط، نول، دليلي) في بيئة الاختبار','تأكد من نجاح الدفع والشحن فعلياً','وثّق حالة كل تكامل ومشاكله'],en:['Test each integration (Thawani, Bank Muscat, Nool, Dalilee) in staging','Confirm payment and shipping actually work','Document each integration status and issues'],fa:['هر یکپارچه‌سازی (ثوانی، بانک مسقط، نول، دلیلی) را در محیط آزمایش تست کنید','از کارکرد واقعی پرداخت و حمل‌ونقل مطمئن شوید','وضعیت و مشکلات هر یکپارچه‌سازی را مستند کنید']},
 'A1.6':{ar:['فعّل عدّاد تجربة ٣٠ يوماً عند التسجيل','أضف فترة سماح ٣–٦ أشهر للمسجّلين مبكراً','اختبر التحوّل التلقائي للاشتراك المدفوع'],en:['Enable a 30-day trial counter at signup','Add a 3–6 month grace period for early adopters','Test automatic conversion to paid subscription'],fa:['شمارنده آزمایش ۳۰ روزه را هنگام ثبت‌نام فعال کنید','دوره مهلت ۳–۶ ماهه برای ثبت‌نام‌کنندگان زودهنگام اضافه کنید','تبدیل خودکار به اشتراک پولی را آزمایش کنید']},
 'A1.7':{ar:['حوّل ملفات الخصوصية والشروط إلى صفحات ويب','أضف روابطها في تذييل الموقع','تأكد من ظهورها بالعربي والإنجليزي'],en:['Convert privacy & T&C files into web pages','Add their links in the site footer','Ensure they show in Arabic and English'],fa:['فایل‌های حریم خصوصی و شرایط را به صفحات وب تبدیل کنید','لینک‌ها را در پاورقی سایت اضافه کنید','از نمایش به عربی و انگلیسی مطمئن شوید']},
 'A1.8':{ar:['أنشئ حساباً تجريبياً ببيانات نموذجية','جهّزه ليعمل دون إنترنت قوي في المعارض','درّب الفريق على عرضه'],en:['Create a demo account with sample data','Make it work without strong internet at expos','Train the team to present it'],fa:['یک حساب نمایشی با داده‌های نمونه بسازید','طوری آماده کنید که در نمایشگاه بدون اینترنت قوی کار کند','تیم را برای ارائه آن آموزش دهید']},
 'A1.9':{ar:['اطلب ملف الدعم بعد البيع من إحسان','وثّق قنوات الدعم وأوقاته','اربطه بدليل تدريب خدمة العملاء'],en:['Get the after-sales support file from Ehsan','Document support channels and hours','Link it to the CS training guide'],fa:['فایل پشتیبانی پس از فروش را از احسان بگیرید','کانال‌ها و ساعات پشتیبانی را مستند کنید','آن را به راهنمای آموزش خدمات مشتری متصل کنید']},

 'A2.1':{ar:['استخدم عقد الفريلانسر الجاهز كأساس','اتفق على عدد المنشورات والتقارير الشهرية','اعتمد خطة محتوى أول شهر'],en:['Use the ready freelancer contract as a base','Agree on monthly posts and reports','Approve the first month content plan'],fa:['از قرارداد فریلنسر آماده به‌عنوان مبنا استفاده کنید','تعداد پست‌ها و گزارش‌های ماهانه را توافق کنید','برنامه محتوای ماه اول را تصویب کنید']},
 'A2.2':{ar:['اجمع التجار من إنستغرام والمعارف والزيارات','صنّفهم حسب القطاع والأولوية','أدخلهم في جدول/CRM مع بيانات التواصل'],en:['Gather merchants from Instagram, contacts and visits','Segment by sector and priority','Enter into a sheet/CRM with contact details'],fa:['تجار را از اینستاگرام، آشنایان و بازدیدها جمع کنید','بر اساس بخش و اولویت دسته‌بندی کنید','در جدول/CRM با اطلاعات تماس وارد کنید']},
 'A2.3':{ar:['حدّد المزايا: بناء متجر مجاني، فترة سماح، خصم ٥٠%','اكتبها في عرض رسمي معتمد','حدّد شروط الأهلية ومدة العرض'],en:['Define perks: free store build, grace period, 50% discount','Write them into an approved formal offer','Set eligibility and offer duration'],fa:['مزایا را تعیین کنید: ساخت رایگان فروشگاه، مهلت، تخفیف ۵۰٪','آن‌ها را در یک پیشنهاد رسمی تأییدشده بنویسید','شرایط واجدبودن و مدت پیشنهاد را تعیین کنید']},
 'A2.4':{ar:['راجع أسعار المنافسين (سلة/زد)','ثبّت أسعار الباقات الثلاث نهائياً','اعتمدها من الإدارة قبل النشر'],en:['Review competitor pricing (Salla/Zid)','Finalize the three plan prices','Get management approval before publishing'],fa:['قیمت رقبا (سلة/زد) را بررسی کنید','قیمت سه بسته را نهایی کنید','پیش از انتشار تأیید مدیریت بگیرید']},
 'A2.5':{ar:['أكمل قائمة شركات الشحن/الدفع/المساندة','تواصل لطلب شروط الربط والعمولات','وقّع اتفاقيات مبدئية مع الأنسب'],en:['Complete the shipping/payment/support companies list','Reach out for integration terms and commissions','Sign preliminary agreements with the best fit'],fa:['فهرست شرکت‌های حمل‌ونقل/پرداخت/پشتیبان را کامل کنید','برای شرایط اتصال و کارمزد تماس بگیرید','با مناسب‌ترین‌ها توافق اولیه امضا کنید']},
 'A2.6':{ar:['احسب المصاريف الشهرية (٩١٨ + التسويق)','قدّر الإيراد الشهري حتى التعادل','احسب رأس المال المطلوب لتغطية العجز','حدّد مصدر التمويل'],en:['Compute monthly costs (918 + marketing)','Estimate monthly revenue until break-even','Compute the capital needed to cover the gap','Identify the funding source'],fa:['هزینه‌های ماهانه (۹۱۸ + بازاریابی) را محاسبه کنید','درآمد ماهانه تا نقطه سربه‌سر را برآورد کنید','سرمایه لازم برای پوشش کسری را محاسبه کنید','منبع تأمین مالی را مشخص کنید']},
 'A2.7':{ar:['تواصل مع منظّمي نمو مستدام وكومكس','احجز الجناح وأكّد التكلفة والمساحة','أضف المواعيد لجدول الفريق'],en:['Contact the Sustainable Growth & COMEX organizers','Book the booth and confirm cost and space','Add the dates to the team calendar'],fa:['با برگزارکنندگان رشد پایدار و کامکس تماس بگیرید','غرفه را رزرو و هزینه و فضا را تأیید کنید','تاریخ‌ها را به تقویم تیم اضافه کنید']},

 'A3.1':{ar:['جهّز كتالوجاً وعرضاً سريعاً للزيارة','زر المحلات وسجّل بيانات المهتمين','تابعهم لتأكيد التسجيل المسبق (≥٥٠)'],en:['Prepare a catalog and quick pitch for visits',"Visit shops and record interested merchants' data",'Follow up to confirm pre-registration (≥50)'],fa:['کاتالوگ و معرفی کوتاه برای بازدید آماده کنید','از مغازه‌ها بازدید و اطلاعات علاقه‌مندان را ثبت کنید','برای تأیید ثبت‌نام اولیه (≥۵۰) پیگیری کنید']},
 'A3.2':{ar:['فعّل أداة وصلة لإرسال واتساب جماعي','جهّز رسائل تعريفية احترافية','نظّم القوائم حسب الفئة'],en:['Activate Wasla for bulk WhatsApp','Prepare professional intro messages','Organize lists by segment'],fa:['ابزار وصلة را برای ارسال گروهی واتساپ فعال کنید','پیام‌های معرفی حرفه‌ای آماده کنید','فهرست‌ها را بر اساس بخش سازماندهی کنید']},
 'A3.3':{ar:['ادرس كل أقسام النظام عملياً','جرّب إنشاء متجر كامل بنفسك','اجتز تقييماً داخلياً قبل دعم التجار'],en:['Study all system modules hands-on','Build a complete store yourself','Pass an internal assessment before supporting merchants'],fa:['همه بخش‌های سیستم را عملی یاد بگیرید','یک فروشگاه کامل خودتان بسازید','پیش از پشتیبانی تجار، ارزیابی داخلی را بگذرانید']},
 'A3.4':{ar:['فعّل نظام التذاكر داخل المنصة','اربط قنوات التواصل (واتساب/بريد)','ابدأ توثيق كل تفاعل مع التاجر'],en:['Enable the in-platform ticketing system','Connect channels (WhatsApp/email)','Start documenting every merchant interaction'],fa:['سیستم تیکت داخل پلتفرم را فعال کنید','کانال‌ها (واتساپ/ایمیل) را متصل کنید','مستندسازی هر تعامل با تاجر را آغاز کنید']},
 'A3.5':{ar:['حدّد قنوات الاستقبال وأوقات العمل','حدّد أزمنة الاستجابة ومستويات التصعيد','اكتبها في دليل واضح للفريق'],en:['Define intake channels and working hours','Set response times and escalation levels','Write them in a clear team guide'],fa:['کانال‌های دریافت و ساعات کاری را تعیین کنید','زمان‌های پاسخ و سطوح ارجاع را مشخص کنید','آن‌ها را در راهنمای روشن تیم بنویسید']},
 'A4.1':{ar:['حدّد الحقول المطلوبة لكل نوع بيانات (منتجات/تصنيفات/علامات/عملاء)','جهّز قوالب Excel/CSV بصيغة يقبلها النظام','أضف صف مثال وتعليمات تعبئة في كل قالب','اختبر استيراد قالب تجريبي للتأكد من توافقه'],en:['Define required fields per data type (products/categories/brands/customers)','Prepare Excel/CSV templates in a format the system accepts','Add an example row and fill instructions in each template','Test-import a sample template to confirm compatibility'],fa:['فیلدهای لازم برای هر نوع داده (محصولات/دسته‌ها/برندها/مشتریان) را تعیین کنید','قالب‌های Excel/CSV را با فرمت قابل‌قبول سیستم آماده کنید','یک ردیف نمونه و دستور تکمیل در هر قالب اضافه کنید','یک قالب نمونه را آزمایشی وارد کنید تا سازگاری تأیید شود']},
 'A4.2':{ar:['راجع البيانات المُدخلة مسبقاً (≈٤٩٩٠ علامة وتصنيفات)','صحّح الأخطاء واحذف المكرر وحدّث الناقص','وحّد التسميات والتصنيفات','اعتمد النسخة المحدّثة كمرجع'],en:['Review the preloaded data (~4990 brands and categories)','Fix errors, remove duplicates and fill gaps','Standardize naming and categories','Approve the updated version as the reference'],fa:['داده‌های از پیش واردشده (~۴۹۹۰ برند و دسته) را بررسی کنید','خطاها را اصلاح، موارد تکراری را حذف و کمبودها را تکمیل کنید','نام‌گذاری و دسته‌بندی‌ها را یکپارچه کنید','نسخه به‌روزشده را به‌عنوان مرجع تأیید کنید']},
 'A4.3':{ar:['انقل البيانات المراجَعة إلى قوالب الإدخال الجاهزة','تأكد من مطابقة الأعمدة لصيغة النظام','راجع عينة قبل الاستيراد الكامل','استورد البيانات وتحقق من ظهورها صحيحة'],en:['Move the reviewed data into the ready import templates','Ensure columns match the system format','Check a sample before the full import','Import the data and verify it shows correctly'],fa:['داده‌های بازبینی‌شده را به قالب‌های آماده ورود منتقل کنید','از تطابق ستون‌ها با فرمت سیستم مطمئن شوید','پیش از ورود کامل، یک نمونه را بررسی کنید','داده‌ها را وارد و از نمایش صحیح آن‌ها مطمئن شوید']},

 'B1':{ar:['اجمع المحتوى: نبذة، مميزات، باقات، طريقة اشتراك','صمّمه بهوية متجرلينك (ألوان/خطوط)','صدّره PDF جاهزاً للطباعة والمشاركة'],en:['Gather content: intro, features, plans, how to subscribe','Design with the MatjarLink identity (colors/fonts)','Export as a print-ready PDF'],fa:['محتوا را جمع کنید: معرفی، ویژگی‌ها، بسته‌ها، نحوه اشتراک','با هویت متجرلینک (رنگ/فونت) طراحی کنید','به‌صورت PDF آماده چاپ خروجی بگیرید']},
 'B2':{ar:['أنشئ جدول مقارنة الباقات الثلاث','أبرز مزايا التسجيل المبكر','صمّمه مختصراً وواضحاً'],en:['Create a comparison table of the three plans','Highlight early-adopter benefits','Design it concise and clear'],fa:['جدول مقایسه سه بسته را بسازید','مزایای ثبت‌نام زودهنگام را برجسته کنید','مختصر و روشن طراحی کنید']},
 'B3':{ar:['أعدّ شرائح: المشكلة، الحل، المميزات، الأسعار','أضف لقطات من المنصة','درّب المقدّم على العرض'],en:['Prepare slides: problem, solution, features, pricing','Add platform screenshots','Train the presenter'],fa:['اسلایدها را آماده کنید: مشکل، راه‌حل، ویژگی‌ها، قیمت','تصاویر پلتفرم را اضافه کنید','ارائه‌دهنده را آموزش دهید']},
 'B4':{ar:['صمّم رول-أب وبانرات بهوية الشركة','أرسلها للطباعة قبل المعرض','جهّز مواد توزيع للجناح'],en:['Design roll-ups and banners with the brand identity','Send to print before the expo','Prepare booth handouts'],fa:['رول‌آپ و بنر با هویت برند طراحی کنید','پیش از نمایشگاه برای چاپ بفرستید','مواد توزیع غرفه را آماده کنید']},
 'B5':{ar:['راجع التصميم الجاهز في مجلد Design','حدّث البيانات والأرقام','اطبع كمية للفريق'],en:['Review the ready design in the Design folder','Update details and numbers','Print a batch for the team'],fa:['طراحی آماده در پوشه Design را بررسی کنید','اطلاعات و شماره‌ها را به‌روزرسانی کنید','تعدادی برای تیم چاپ کنید']},

 'B6':{ar:['صوّر كل خطوة من معالج الـ١٠ خطوات','اكتب شرحاً موجزاً وأهمية كل خطوة','جمّعها في ملف PDF مصوّر'],en:['Screenshot each of the 10 wizard steps','Write a brief explanation and why each matters','Compile into an illustrated PDF'],fa:['از هر یک از ۱۰ مرحله راهنما تصویر بگیرید','توضیح کوتاه و اهمیت هر مرحله را بنویسید','در یک PDF مصوّر گردآوری کنید']},
 'B7':{ar:['اكتب سيناريو لكل فيديو قصير','سجّل الشاشة مع شرح صوتي','انشرها على يوتيوب وداخل المنصة'],en:['Write a script for each short video','Record the screen with voice-over','Publish on YouTube and in-platform'],fa:['برای هر ویدیوی کوتاه فیلم‌نامه بنویسید','صفحه را با روایت صوتی ضبط کنید','در یوتیوب و داخل پلتفرم منتشر کنید']},
 'B8':{ar:['اشرح التصفح والإضافة للسلة والشراء','أضف خطوات تتبّع الطلب','اجعله بسيطاً لعميل المتجر'],en:['Explain browsing, adding to cart and checkout','Add order-tracking steps','Keep it simple for the store customer'],fa:['مرور، افزودن به سبد و خرید را توضیح دهید','مراحل پیگیری سفارش را اضافه کنید','برای مشتری فروشگاه ساده نگه دارید']},
 'B9':{ar:['أنشئ صفحة بداية سريعة برابط واحد','أدرج أهم ٥ خطوات للبدء','اربطها برسائل الترحيب'],en:['Create a quick-start page with a single link','List the top 5 steps to begin','Link it to welcome messages'],fa:['یک صفحه شروع سریع با یک لینک بسازید','۵ مرحله اصلی شروع را فهرست کنید','آن را به پیام‌های خوش‌آمد متصل کنید']},

// ===== state & rendering =====
const KEY='matjarlink_plan_v1';      // done state
const LKEY='matjarlink_lang';        // language
const AKEY='matjarlink_assign';      // {id: person}
const EKEY='matjarlink_edits';       // {id: {task,desc,depts,pri}}  (overrides for seed tasks)
const CKEY='matjarlink_custom';      // [ {id,secId,task,desc,depts,pri} ]  custom tasks
const DKEY='matjarlink_deleted';     // {id:1}
const OKEY='matjarlink_order';       // {secId: [id,id,...]}  custom ordering
let state   = JSON.parse(LS.getItem(KEY)||'{}');
let assign  = JSON.parse(LS.getItem(AKEY)||'{}');
let edits   = JSON.parse(LS.getItem(EKEY)||'{}');
let custom  = JSON.parse(LS.getItem(CKEY)||'[]');
let deleted = JSON.parse(LS.getItem(DKEY)||'{}');
let order   = JSON.parse(LS.getItem(OKEY)||'{}');
const PRANK = {crit:0, high:1, norm:2};   // critical first
const TKEY='matjarlink_dates', GKEY='matjarlink_log', MEKEY='matjarlink_me';
let dates = JSON.parse(LS.getItem(TKEY)||'{}');   // {id:{start,due}}
let log   = JSON.parse(LS.getItem(GKEY)||'[]');   // activity log

let lang = LS.getItem(LKEY) || 'ar';
let curFilter = 'all';      // department

const $ = id => document.getElementById(id);
// cloud config
const CURLKEY='matjarlink_cloud_url', CTOKKEY='matjarlink_cloud_token', FKEY='matjarlink_cloudfiles';
let CLOUD_URL=LS.getItem(CURLKEY)||'', CLOUD_TOKEN=LS.getItem(CTOKKEY)||'';
// Web-app mode: when served from Google Apps Script, the server injects window.MATJARLINK_WEBAPP
// with its own URL + secret, so the board auto-connects with zero setup on any device.
const WEBAPP = (typeof window!=='undefined' && window.MATJARLINK_WEBAPP && window.MATJARLINK_WEBAPP.url) ? window.MATJARLINK_WEBAPP : null;
if(WEBAPP){ CLOUD_URL=WEBAPP.url; CLOUD_TOKEN=WEBAPP.token||''; }
let cloudFiles=JSON.parse(LS.getItem(FKEY)||'[]');   // file metadata when cloud is on
const cloudOn=()=>!!CLOUD_URL;
// ===== SQLite (sql.js) storage =====
let SQL=null, DB=null, dbFileHandle=null, dbPersistTimer=null, SERVER_MODE=false;
const BUCKETS=[KEY,AKEY,EKEY,CKEY,DKEY,OKEY,TKEY,GKEY,MEKEY,LKEY];
const save0=(k,v)=>{ LS.setItem(k,JSON.stringify(v)); if(DB) dbSet(k,v); };  // localStorage + SQLite mirror
const save=(k,v)=>{ save0(k,v); scheduleCloudPush(); };
function dbSet(k,v){ if(!DB) return; try{ DB.run("INSERT INTO kv(k,v) VALUES(?,?) ON CONFLICT(k) DO UPDATE SET v=excluded.v",[k,JSON.stringify(v)]); }catch(e){} scheduleDbPersist(); }
function scheduleDbPersist(){ if(!DB) return; if(!dbFileHandle && !SERVER_MODE) return; clearTimeout(dbPersistTimer); dbPersistTimer=setTimeout(persistDbNow,1200); }

// effective rows of a section: [{id,task,desc,depts,pri,custom}]
// pick current-language value from a string or {ar,en,fa} object (back-compatible)
function L(v){ if(v==null) return ''; if(typeof v==='string') return v; return v[lang]||v.ar||v.en||v.fa||''; }
function Lsteps(v){ if(!v) return []; if(Array.isArray(v)) return v; return v[lang]||v.ar||v.en||v.fa||[]; }
function sectionRows(sec){
  const out=[];
  sec.rows.forEach(r=>{
    const id=r[0]; if(deleted[id]) return;
    const e=edits[id];
    out.push({ id,
      task: e&&e.task!=null ? L(e.task) : r[1][lang],
      desc: e&&e.desc!=null ? L(e.desc) : r[2][lang],
      depts: e&&e.depts ? e.depts : r[3],
      pri:  e&&e.pri ? e.pri : r[4],
      steps: e&&e.steps ? Lsteps(e.steps) : ((STEPS[id]&&STEPS[id][lang])||[]),
      custom:false });
  });
  custom.filter(c=>c.secId===sec.id && !deleted[c.id]).forEach(c=>{
    out.push({ id:c.id, task:L(c.task), desc:L(c.desc), depts:c.depts||[], pri:c.pri||'norm', steps:Lsteps(c.steps), custom:true });
  });
  return out;
}
// apply custom order if set, otherwise sort by priority (critical first)
function orderedRows(sec){
  const base=sectionRows(sec);
  const byId={}; base.forEach(r=>byId[r.id]=r);
  const stored=order[sec.id];
  let ids;
  if(stored && stored.length){
    ids=stored.filter(id=>byId[id]);                       // keep saved order, drop deleted
    const extra=base.filter(r=>ids.indexOf(r.id)<0)
                    .sort((a,b)=>PRANK[a.pri]-PRANK[b.pri]).map(r=>r.id); // new tasks by priority
    ids=ids.concat(extra);
  } else {
    ids=base.slice().sort((a,b)=>PRANK[a.pri]-PRANK[b.pri]).map(r=>r.id);
  }
  return ids.map(id=>byId[id]);
}
function reorder(secId,id,val){
  const sec=SECTIONS.find(s=>s.id===secId); if(!sec) return;
  let ids=orderedRows(sec).map(r=>r.id);
  let pos=parseInt(val,10); if(isNaN(pos)){ renderContent(); applyFilter(); return; }
  pos=Math.max(1,Math.min(ids.length,pos));
  ids=ids.filter(x=>x!==id);
  ids.splice(pos-1,0,id);
  order[secId]=ids; save(OKEY,order);
  renderContent(); recalc(); applyFilter();
}

function renderContent(){
  const t = UI[lang];
  const content = $('content'); content.innerHTML='';
  SECTIONS.forEach(sec=>{
    const s=document.createElement('section');
    s.className='block'; s.dataset.id=sec.id;
    const rows=orderedRows(sec).map((r,i)=>{
      const checked=state[r.id]?'checked':'';
      const deptHtml=r.depts.map(d=>`<span class="dept ${DEPT_CLASS[d]}">${t[DEPT_UI[d]]}</span>`).join('');
      const whoOpts=`<option value="">${t.unassigned}</option>`+PEOPLE.map(p=>
        `<option value="${p.k}" ${assign[r.id]===p.k?'selected':''}>${p[lang]}</option>`).join('');
      const hasSteps=r.steps&&r.steps.length;
      const sBtn=hasSteps?`<button class="sbtn" title="${t.stepsTitle}" onclick="toggleSteps(event,'${r.id}')">▾</button> `:'';
      const ac=(fileIndex[r.id]||[]).length;
      const clip=`<span class="clip" title="${t.mAttach}" onclick="event.stopPropagation();openAtt('${r.id}')">📎${ac?' '+ac:''}</span>`;
      const stepRow=hasSteps?`<tr class="steprow" id="sr-${r.id}" style="display:none"><td></td><td colspan="7">
        <div class="stepbox"><b>${t.stepsTitle}</b><ol>${r.steps.map(s=>`<li>${escapeHtml(s)}</li>`).join('')}</ol></div></td></tr>`:'';
      return `<tr data-id="${r.id}" data-dept="${r.depts.join(' ')}" data-person="${assign[r.id]||''}" class="${state[r.id]?'done':''}">
        <td class="chk"><input type="checkbox" ${checked} onchange="toggle('${r.id}',this)"></td>
        <td class="seqcell"><input class="seq" type="number" min="1" value="${i+1}" title="${r.id}" onclick="event.stopPropagation()" onchange="reorder('${sec.id}','${r.id}',this.value)"></td>
        <td><div class="task">${sBtn}${escapeHtml(r.task)}${clip}</div><div class="desc">${escapeHtml(r.desc)}</div></td>
        <td class="hide-m">${deptHtml}</td>
        <td class="who"><select onchange="setAssign('${r.id}',this.value)">${whoOpts}</select></td>
        <td><span class="badge ${PRI_CLASS[r.pri]}">${t[PRI_UI[r.pri]]}</span></td>
        <td class="datecell">${dueCell(r.id)}</td>
        <td class="act"><button class="ebtn" onclick="openEdit('${r.id}')">✎</button></td>
      </tr>${stepRow}`;
    }).join('');
    s.innerHTML=`
      <div class="sec-head ${sec.crit?'crit':''}" onclick="this.parentNode.classList.toggle('collapsed')">
        <span class="chev">▼</span>
        <h2>${sec.title[lang]}<span class="goal">${sec.goal[lang]}</span></h2>
        <span class="mini" id="mini-${sec.id}"></span>
      </div>
      <div class="sec-body">
        <table>
          <thead><tr><th></th><th>${t.thCode}</th><th>${t.thTask}</th><th class="hide-m">${t.thDept}</th><th>${t.thWho}</th><th>${t.thPri}</th><th>${t.thDate}</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    content.appendChild(s);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function buildPersonFilter(){

}

async function cloudTranslate(text, source, target){

// build {ar,en,fa} objects for task/desc/steps; current lang = typed text, others auto-translated (cloud)
async function buildTranslations(task,desc,steps){
  const langs=['ar','en','fa'], tObj={}, dObj={}, sObj={};
  langs.forEach(l=>{ tObj[l]=task; dObj[l]=desc; sObj[l]=steps.slice(); });
  if(cloudOn()){
    const targets=langs.filter(l=>l!==lang);
    await Promise.all(targets.map(async tg=>{

      dObj[tg]=await cloudTranslate(desc,lang,tg);

let idb=null;
function openIdb(){ return new Promise(res=>{ let r; try{r=indexedDB.open('matjarlink_files',1);}catch(e){return res(null);}
  r.onupgradeneeded=e=>{const db=e.target.result; if(!db.objectStoreNames.contains('files')) db.createObjectStore('files',{keyPath:'key'});};
  r.onsuccess=e=>{idb=e.target.result;res(idb);}; r.onerror=()=>res(null); }); }
function idbAll(){ return new Promise(res=>{ if(!idb)return res([]); const rq=idb.transaction('files','readonly').objectStore('files').getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }); }
function idbPut(rec){ return new Promise(res=>{ if(!idb)return res(); const tx=idb.transaction('files','readwrite'); tx.objectStore('files').put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }
function idbDel(key){ return new Promise(res=>{ if(!idb)return res(); const tx=idb.transaction('files','readwrite'); tx.objectStore('files').delete(key); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }

function dbFilePut(rec,bytes){ DB.run("INSERT OR REPLACE INTO files(key,taskId,name,type,size,time,actor,data) VALUES(?,?,?,?,?,?,?,?)",[rec.key,rec.taskId,rec.name,rec.type,rec.size,rec.time,rec.actor,bytes]); scheduleDbPersist(); }
function dbFileAll(){ const r=DB.exec("SELECT key,taskId,name,type,size,time,actor FROM files"); if(!r.length)return []; return r[0].values.map(v=>({key:v[0],taskId:v[1],name:v[2],type:v[3],size:v[4],time:v[5],actor:v[6]})); }
function dbFileGet(key){ const r=DB.exec("SELECT data,name,type FROM files WHERE key=?",[key]); if(!r.length)return null; const v=r[0].values[0]; return {data:v[0],name:v[1],type:v[2]}; }

    if(d.state)state=d.state; if(d.assign)assign=d.assign; if(d.edits)edits=d.edits;
    if(d.custom)custom=d.custom; if(d.deleted)deleted=d.deleted; if(d.order)order=d.order;
    if(d.dates)dates=d.dates; if(d.log)log=d.log; if(d.files)cloudFiles=d.files;
    save0(KEY,state);save0(AKEY,assign);save0(EKEY,edits);save0(CKEY,custom);save0(DKEY,deleted);
    save0(OKEY,order);save0(TKEY,dates);save0(GKEY,log);save0(FKEY,cloudFiles);
    setCloudState(t.stConnected); return true;
  }catch(e){ setCloudState(t.stError); return false; }
}
function openCloud(){ const t=UI[lang];
  $('cloudTitle').textContent=t.cloudTitle; $('cloudHint').textContent=t.cloudHint;
  $('lbl-curl').textContent=t.lblCurl; $('lbl-ctoken').textContent=t.lblCtoken;
  $('c-save').textContent=t.cSave; $('c-cancel').textContent=t.cCancel; $('c-pull').textContent=t.cPull; $('c-push').textContent=t.cPush; $('c-disc').textContent=t.cDisc;
  $('c-url').value=CLOUD_URL; $('c-token').value=CLOUD_TOKEN; $('cloudMsg').textContent='';
  $('cloudBg').classList.add('open');
}
function closeCloud(){ $('cloudBg').classList.remove('open'); }
function cloudMsg(m,color){ const el=$('cloudMsg'); el.style.color=color||'var(--green)'; el.textContent=m; }
async function cloudConnect(){ const t=UI[lang];
  const url=$('c-url').value.trim(), tok=$('c-token').value.trim();
  if(!url||!tok){ cloudMsg(t.msgNeedUrl,'var(--red)'); return; }
  CLOUD_URL=url; CLOUD_TOKEN=tok; LS.setItem(CURLKEY,url); LS.setItem(CTOKKEY,tok);
  const ok=await cloudLoad();
  if(ok){ cloudMsg(t.msgConnected); await refreshFiles(); renderContent(); recalc(); applyFilter(); }
  else cloudMsg(t.msgErr,'var(--red)');
  setCloudState();
}
async function cloudPullNow(){ const t=UI[lang]; const ok=await cloudLoad();
  if(ok){ cloudMsg(t.msgPull); await refreshFiles(); renderContent(); recalc(); applyFilter(); if(curView==='activity')renderLog(); if(curView==='files')renderFiles(); }
  else cloudMsg(t.msgErr,'var(--red)'); }
async function cloudPushNow(){ const t=UI[lang]; await cloudPush(); cloudMsg(t.msgPush); }
function cloudDisconnect(){ const t=UI[lang]; CLOUD_URL=''; CLOUD_TOKEN=''; LS.removeItem(CURLKEY); LS.removeItem(CTOKKEY);
  cloudMsg(t.msgDisc,'var(--muted)'); setCloudState(); refreshFiles().then(()=>{renderContent();applyFilter();if(curView==='files')renderFiles();}); }
function renderFiles(){
  const t=UI[lang], q=($('fileSearch').value||'').toLowerCase(), box=$('filesList');
  let all=[]; Object.keys(fileIndex).forEach(tid=>fileIndex[tid].forEach(f=>all.push(f)));
  if(q) all=all.filter(f=>(f.name||'').toLowerCase().includes(q)||(taskInfo(f.taskId).title||'').toLowerCase().includes(q));
  const totalSize=all.reduce((s,f)=>s+(f.size||0),0);
  $('filesTotal').textContent = all.length+' '+t.totalFiles+' · '+fmtSize(totalSize);
  if(!all.length){ box.innerHTML=`<div class="empty">${t.filesEmpty}</div>`; return; }
  const groups={};
  all.forEach(f=>{ const info=taskInfo(f.taskId); const sk=info.sec||'—';
    groups[sk]=groups[sk]||{};
    (groups[sk][f.taskId]=groups[sk][f.taskId]||{title:info.title,files:[]}).files.push(f); });
  let html='';
  Object.keys(groups).forEach(sk=>{
    html+=`<div class="fgroup"><h3>${escapeHtml(sk)}</h3>`;
    Object.keys(groups[sk]).forEach(tid=>{ const g=groups[sk][tid];
      g.files.forEach(f=>{
        html+=`<div class="fitem"><span class="fic">${fileIcon(f.type,f.name)}</span>
          <span class="fn">${escapeHtml(f.name)}<div class="fmeta">${escapeHtml(g.title)} · ${fmtSize(f.size)} · ${fmtTime(f.time)}${f.actor?' · '+escapeHtml(personLabel(f.actor)):''}</div></span>
          <a class="dl" onclick="dlFile('${f.key}')">⬇ ${t.dl}</a>
          <button class="fdel" onclick="delFileArchive('${f.key}','${f.taskId}')">${t.del}</button></div>`;
      });
    });
    html+='</div>';
  });
  box.innerHTML=html;
}
// ===== view switching =====
function switchView(v){
  curView=v;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  $('view-plan').classList.toggle('active',v==='plan');
  $('view-activity').classList.toggle('active',v==='activity');
  $('view-files').classList.toggle('active',v==='files');
  if(v==='activity') renderLog();
  if(v==='files') renderFiles();
}

// ===== SQLite database: open / create / persist =====
async function ensureSQL(){ if(!SQL){ if(typeof initSqlJs!=='function') throw new Error('sql.js not loaded (lib/ missing?)'); SQL=await initSqlJs(); } }
function dbEnsureSchema(){ DB.run("CREATE TABLE IF NOT EXISTS kv(k TEXT PRIMARY KEY, v TEXT)"); DB.run("CREATE TABLE IF NOT EXISTS files(key TEXT PRIMARY KEY, taskId TEXT, name TEXT, type TEXT, size INTEGER, time INTEGER, actor TEXT, data BLOB)"); }
function dbGetRaw(k){ try{ const r=DB.exec("SELECT v FROM kv WHERE k=?",[k]); return r.length? r[0].values[0][0] : null; }catch(e){ return null; } }
function loadFromDB(){
  const g=(k,def)=>{ const raw=dbGetRaw(k); if(raw==null) return def; try{ return JSON.parse(raw); }catch(e){ return def; } };
  state=g(KEY,{}); assign=g(AKEY,{}); edits=g(EKEY,{}); custom=g(CKEY,[]); deleted=g(DKEY,{});
  order=g(OKEY,{}); dates=g(TKEY,{}); log=g(GKEY,[]);
  const m=g(MEKEY,null); if(m!=null) me=m;
  const lg=g(LKEY,null); if(lg!=null) lang=lg;
}
function migrateLocalToDB(){ [[KEY,state],[AKEY,assign],[EKEY,edits],[CKEY,custom],[DKEY,deleted],[OKEY,order],[TKEY,dates],[GKEY,log],[MEKEY,me],[LKEY,lang]].forEach(a=>dbSet(a[0],a[1])); }
async function migrateIdbFilesToDB(){ try{ await openIdb(); const all=await idbAll(); for(const f of all){ if(f.blob){ const buf=new Uint8Array(await f.blob.arrayBuffer()); dbFilePut({key:f.key,taskId:f.taskId,name:f.name,type:f.type,size:f.size,time:f.time,actor:f.actor}, buf); } } }catch(e){} }
async function persistDbNow(){ if(!DB) return; let data; try{ data=DB.export(); }catch(e){ return; }
  try{
    if(SERVER_MODE){ await fetch('/api/db',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:data}); setDbState(); return; }
    if(dbFileHandle && dbFileHandle.createWritable){ const w=await dbFileHandle.createWritable(); await w.write(data); await w.close(); }
    else { downloadDbFile(data); }
    setDbState();
  }catch(e){ setDbState('err'); }
}
async function detectServer(){ try{ const r=await fetch('/api/ping',{cache:'no-store'}); if(r.ok){ const j=await r.json(); return !!j.ok; } }catch(e){} return false; }
async function serverLoadDb(){ try{ const r=await fetch('/api/db',{cache:'no-store'}); if(r.status===204) return null; const buf=new Uint8Array(await r.arrayBuffer()); return buf.length? buf : null; }catch(e){ return null; } }
function downloadDbFile(data){ const blob=new Blob([data],{type:'application/octet-stream'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='matjarlink.sqlite'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),5000); }
function setDbState(){ const el=$('dbState'); if(!el) return; const t=UI[lang]; el.textContent = SERVER_MODE ? t.dbAuto : (!DB ? t.dbOff : (dbFileHandle? t.dbSaved : t.dbMem)); }
function pickFileInput(){ return new Promise(res=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='.sqlite,.db,.sqlite3'; inp.onchange=async()=>{ const f=inp.files[0]; if(!f)return res(null); res(new Uint8Array(await f.arrayBuffer())); }; inp.click(); }); }
async function openExistingDb(){
  $('dbErr').textContent='';
  try{
    await ensureSQL();
    let buf=null;
    if(window.showOpenFilePicker){ let h=null; try{ [h]=await window.showOpenFilePicker({types:[{description:'SQLite',accept:{'application/x-sqlite3':['.sqlite','.db','.sqlite3']}}]}); }catch(e){ if(e&&e.name==='AbortError') return; }
      if(h){ dbFileHandle=h; const file=await h.getFile(); buf=new Uint8Array(await file.arrayBuffer()); } }
    if(!buf){ dbFileHandle=null; buf=await pickFileInput(); }
    if(!buf) return;
    DB=new SQL.Database(buf); dbEnsureSchema(); loadFromDB();
    await finishDbStart();
  }catch(e){ $('dbErr').textContent=UI[lang].dbFail+': '+e.message; }
}
async function createNewDb(){
  $('dbErr').textContent='';
  try{
    await ensureSQL();
    DB=new SQL.Database(); dbEnsureSchema();
    migrateLocalToDB(); await migrateIdbFilesToDB();
    if(window.showSaveFilePicker){ try{ dbFileHandle=await window.showSaveFilePicker({suggestedName:'matjarlink.sqlite',types:[{description:'SQLite',accept:{'application/x-sqlite3':['.sqlite']}}]}); await persistDbNow(); }catch(e){ if(e&&e.name!=='AbortError') throw e; dbFileHandle=null; downloadDbFile(DB.export()); } }
    else { dbFileHandle=null; downloadDbFile(DB.export()); }
    await finishDbStart();
  }catch(e){ $('dbErr').textContent=UI[lang].dbFail+': '+e.message; }
}
async function finishDbStart(){ $('dbOverlay').style.display='none'; await refreshFiles(); applyLang(); recalc(); if(curView==='activity') renderLog(); if(curView==='files') renderFiles(); setDbState(); }
function skipDb(){ $('dbOverlay').style.display='none'; setDbState(); }

$('dbOpen').addEventListener('click',openExistingDb);
$('dbNew').addEventListener('click',createNewDb);
$('dbSkip').addEventListener('click',skipDb);
$('dbBtn').addEventListener('click',()=>{ if(DB) persistDbNow(); else $('dbOverlay').style.display='flex'; });

applyLang();
(async ()=>{
  await openIdb();
  if(WEBAPP){
    // hosted on Apps Script: data lives in Drive, shared by everyone — no DB picker, no local server
    $('dbOverlay').style.display='none';
    $('dbBtn').style.display='none';
    await cloudLoad();
    await refreshFiles();
    renderContent(); recalc(); applyFilter();
    if(curView==='files') renderFiles();
    setCloudState(); setDbState();
    return;
  }
  SERVER_MODE = await detectServer();
  if(SERVER_MODE){
    // auto mode: load DB from the local server, or create+seed it, then auto-save on every change
    try{
      await ensureSQL();
      const buf = await serverLoadDb();
      if(buf){ DB=new SQL.Database(buf); dbEnsureSchema(); loadFromDB(); }
      else { DB=new SQL.Database(); dbEnsureSchema(); migrateLocalToDB(); await migrateIdbFilesToDB(); await persistDbNow(); }
    }catch(e){ SERVER_MODE=false; }
    $('dbOverlay').style.display='none';
  } else if(cloudOn()){
    await cloudLoad();
  }
  await refreshFiles();
  renderContent(); recalc(); applyFilter();
  if(curView==='files') renderFiles();
  setCloudState(); setDbState();
})();
</script>
